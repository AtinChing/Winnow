<!doctype html><html><head><meta charset="utf-8"><title>Winnow settings</title><style>body{max-width:650px;margin:32px auto;font:15px system-ui;color:#222}textarea{width:100%;height:100px}label{display:block;margin:12px 0}fieldset{margin:18px 0}button{padding:7px 12px}small{color:#666}</style></head><body><h1>Winnow settings</h1><label>Sensitivity <select id="sensitivity"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></label><fieldset><legend>Custom blocklist</legend><textarea id="blocklist" placeholder="One term per line"></textarea><small>Terms are normalized to catch common spacing and character substitutions.</small></fieldset><fieldset><legend>Allowlist</legend><textarea id="allowlist" placeholder="One term per line"></textarea><small>Allowlisted terms override the bundled and custom blocklists.</small></fieldset><fieldset><legend>Advanced thresholds</legend><label>Flood message count <input id="floodMessages" type="number" min="1"></label><label>Duplicate count <input id="duplicateCount" type="number" min="1"></label><label>Caps ratio <input id="capsRatio" type="number" min="0" max="1" step="0.05"></label></fieldset><button id="save">Save settings</button> <button id="reset">Reset defaults</button><p id="status"></p><script src="options/options.js"></script></body></html>

<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Winnow settings</title>
    <style>
      :root {
        --ink: #1f2a30;
        --muted: #5c6b73;
        --line: #d7e0e4;
        --accent: #2f6f68;
        --bg: #f4f7f6;
      }
      body {
        max-width: 650px;
        margin: 36px auto;
        padding: 0 18px 40px;
        font: 15px/1.45 "Segoe UI", ui-sans-serif, system-ui, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(90% 50% at 0% 0%, rgba(47, 111, 104, 0.1), transparent 50%),
          var(--bg);
      }
      h1 {
        margin: 0 0 8px;
        letter-spacing: -0.02em;
      }
      .lead {
        color: var(--muted);
        margin: 0 0 20px;
      }
      textarea,
      input[type='number'],
      select {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        font: inherit;
        background: #fff;
      }
      textarea {
        height: 110px;
        resize: vertical;
      }
      label {
        display: block;
        margin: 12px 0;
      }
      fieldset {
        margin: 18px 0;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.7);
      }
      button {
        padding: 8px 14px;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        cursor: pointer;
      }
      button#reset {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--line);
      }
      small,
      #status {
        color: var(--muted);
      }
      #thresholds label {
        display: grid;
        grid-template-columns: 1fr 120px;
        gap: 10px;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <h1>Winnow settings</h1>
    <p class="lead">Tune thresholds and lists. Filtering stays on-device.</p>
    <label>
      Sensitivity
      <select id="sensitivity">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </label>
    <fieldset>
      <legend>Custom blocklist</legend>
      <textarea id="blocklist" placeholder="One term per line"></textarea>
      <small>Terms are normalized to catch common spacing and character substitutions.</small>
    </fieldset>
    <fieldset>
      <legend>Allowlist</legend>
      <textarea id="allowlist" placeholder="One term per line"></textarea>
      <small>Allowlisted terms override the bundled and custom blocklists.</small>
    </fieldset>
    <fieldset>
      <legend>Advanced thresholds</legend>
      <div id="thresholds"></div>
    </fieldset>
    <button id="save">Save settings</button>
    <button id="reset">Reset defaults</button>
    <p id="status"></p>
    <script src="options/options.js"></script>
  </body>
</html>
